<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: "TIM Sans";
        src: url("http://localhost:3000/timsans-regular.ttf") format("truetype");
        font-weight: 400;
      }

      @font-face {
        font-family: "TIM Sans";
        src: url("http://localhost:3000/timsans-bold.ttf") format("truetype");
        font-weight: 700;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "TIM Sans", Arial, sans-serif;
        background: #122ac2;
        color: #070707;
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 24px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 18px;
      }

      .brand {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 54px;
      }

      .brand img {
        width: 190px;
        max-height: 50px;
        object-fit: contain;
      }

      .brand-fallback {
        color: white;
        font-size: 28px;
        line-height: 1;
        font-weight: 700;
      }

      .panel {
        width: 100%;
        min-height: 0;
        background: white;
        border-radius: 30px;
        padding: 24px;
        display: grid;
        grid-template-rows: auto auto 1fr auto auto;
        gap: 14px;
        align-items: center;
        text-align: center;
      }

      .kicker {
        margin: 0;
        color: #122ac2;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: .95;
        letter-spacing: -.055em;
        font-weight: 700;
      }

      .preview {
        align-self: center;
        height: 158px;
        border: 1px solid #dfe5ff;
        border-radius: 20px;
        background: #f7f8ff;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .slot-hint {
        min-height: 20px;
        color: #697185;
        font-size: 13px;
        line-height: 1.25;
        font-weight: 400;
      }

      button.primary {
        width: 100%;
        height: 54px;
        border: 0;
        border-radius: 999px;
        background: #122ac2;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 16px 32px rgba(18, 42, 194, .22);
      }

      button.primary:disabled {
        opacity: .65;
        cursor: default;
        box-shadow: none;
      }

      .status {
        min-height: 18px;
        font-size: 12px;
        line-height: 1.2;
        color: #697185;
        text-align: center;
      }

      .status.ok { color: #0a7a3f; font-weight: 700; }
      .status.error { color: #e60028; font-weight: 700; }

      .loading {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 3px solid rgba(255,255,255,.35);
        border-top-color: white;
        display: inline-block;
        vertical-align: -3px;
        margin-right: 8px;
        animation: spin .8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <img id="logo" src="http://localhost:3000/logo-ultrastudio.png" alt="UltraStudio" onerror="this.style.display='none'; document.getElementById('fallback').style.display='block';" />
        <div id="fallback" class="brand-fallback" style="display:none;">UltraStudio</div>
      </div>

      <main class="panel">
        <p class="kicker">Campagna pronta</p>
        <h1 id="campaignName">TIM WiFi Casa</h1>

        <div class="preview">
          <img id="previewImage" src="http://localhost:3000/api/figma/asset/demo-final-campaign.png" alt="Anteprima campagna" />
        </div>

        <div class="slot-hint" id="slotHint">Controllo tavole in corso...</div>

        <button class="primary" id="applyButton">Applica alle tavole</button>
        <div class="status" id="status">Pronto.</div>
      </main>
    </div>

    <script>
      const ENDPOINT = "http://localhost:3000/api/figma/latest";
      let campaign = null;

      const statusEl = document.getElementById("status");
      const slotHintEl = document.getElementById("slotHint");
      const applyButton = document.getElementById("applyButton");
      const campaignNameEl = document.getElementById("campaignName");
      const previewImageEl = document.getElementById("previewImage");

      function setStatus(text, type = "") {
        statusEl.className = `status ${type}`;
        statusEl.textContent = text;
      }

      function setSlotHint(scan) {
        const imageCount = scan?.imageSlots || 0;
        const textCount = scan?.textSlots || 0;

        if (!imageCount && !textCount) {
          slotHintEl.textContent = "Nessun layer UltraStudio trovato nella pagina corrente.";
          return;
        }

        slotHintEl.textContent = `${imageCount} asset e ${textCount} testi pronti da aggiornare.`;
      }

      async function fetchCampaign() {
        const response = await fetch(ENDPOINT, { cache: "no-store" });
        if (!response.ok) throw new Error("UltraStudio non disponibile");
        campaign = await response.json();

        campaignNameEl.textContent = campaign.campaignName || "Campagna pronta";
        previewImageEl.src = campaign.finalImageUrl || "http://localhost:3000/api/figma/asset/demo-final-campaign.png";
        setStatus("Pronto.");
        return campaign;
      }

      async function imageUrlToBytes(url) {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) throw new Error("Asset non disponibile");
        const buffer = await response.arrayBuffer();
        return Array.from(new Uint8Array(buffer));
      }

      applyButton.addEventListener("click", async () => {
        try {
          applyButton.disabled = true;
          applyButton.innerHTML = '<span class="loading"></span>Applico...';
          setStatus("Aggiornamento in corso...");

          if (!campaign) await fetchCampaign();
          const personImageBytes = await imageUrlToBytes(campaign.personImageUrl || campaign.imageUrl);

          parent.postMessage(
            {
              pluginMessage: {
                type: "apply-ultrastudio",
                payload: {
                  personImageBytes,
                  headline: campaign.headline,
                  priceLeft: campaign.priceLeft,
                  priceRight: campaign.priceRight,
                  pricePeriod: campaign.pricePeriod,
                  cta: campaign.cta,
                },
              },
            },
            "*"
          );
        } catch (error) {
          applyButton.disabled = false;
          applyButton.textContent = "Applica alle tavole";
          setStatus(error?.message || "Applicazione non riuscita.", "error");
        }
      });

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        if (message.type === "scan-result") {
          setSlotHint(message.result);
          return;
        }

        if (message.type === "apply-success") {
          const imageCount = message.result?.imageSlots || 0;
          const textCount = message.result?.textSlots || 0;
          applyButton.disabled = false;
          applyButton.textContent = "Applica alle tavole";
          setStatus(`Aggiornati ${imageCount} asset e ${textCount} testi.`, "ok");
          setSlotHint(message.result);
          return;
        }

        if (message.type === "apply-error") {
          applyButton.disabled = false;
          applyButton.textContent = "Applica alle tavole";
          setStatus(message.message || "Applicazione non riuscita.", "error");
        }
      };

      fetchCampaign().catch(() => {
        setStatus("Apri UltraStudio su localhost:3000 e riprova.", "error");
      });

      parent.postMessage({ pluginMessage: { type: "scan-ultrastudio" } }, "*");
    </script>
  </body>
</html>
