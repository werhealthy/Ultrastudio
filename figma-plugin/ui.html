<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#122ac2;color:#fff;}

    .wrap{width:100%;height:100%;display:flex;flex-direction:column;padding:16px;gap:12px;}

    /* Header */
    .header{display:flex;justify-content:center;align-items:center;height:48px;}
    .header img{height:36px;object-fit:contain;}
    .header-fallback{font-size:22px;font-weight:700;color:#fff;}

    /* Slot hint */
    .slot-hint{font-size:13px;color:rgba(255,255,255,.7);text-align:center;min-height:18px;}

    /* Lista campagne */
    .campaigns-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);}
    .campaigns-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
    .campaigns-list::-webkit-scrollbar{width:4px;}
    .campaigns-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px;}

    /* Card campagna */
    .campaign-card{
      background:#fff;border-radius:20px;padding:12px;
      display:grid;grid-template-columns:72px 1fr;gap:10px;
      cursor:pointer;transition:opacity .15s;border:2px solid transparent;
    }
    .campaign-card:hover{opacity:.9;}
    .campaign-card.selected{border-color:#eb0028;}
    .campaign-card.latest{border-color:#fff;}

    .card-preview{border-radius:10px;overflow:hidden;background:#f0f2ff;height:48px;display:flex;align-items:center;justify-content:center;}
    .card-preview img{width:100%;height:100%;object-fit:cover;}

    .card-info{display:flex;flex-direction:column;gap:2px;overflow:hidden;}
    .card-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#eb0028;}
    .card-badge.latest-badge{color:#122ac2;}
    .card-headline{font-size:13px;font-weight:700;color:#0033a1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-price{font-size:12px;color:#666;}
    .card-date{font-size:10px;color:#999;margin-top:auto;}

    /* Empty state */
    .empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;opacity:.6;}
    .empty-icon{font-size:28px;}
    .empty-text{font-size:13px;text-align:center;line-height:1.4;}

    /* Footer */
    .footer{display:flex;flex-direction:column;gap:8px;}
    .btn-apply{
      width:100%;height:48px;border:0;border-radius:999px;
      background:#eb0028;color:#fff;font-size:15px;font-weight:700;
      cursor:pointer;transition:opacity .15s;
    }
    .btn-apply:disabled{opacity:.5;cursor:default;}
    .btn-refresh{
      width:100%;height:36px;border:1.5px solid rgba(255,255,255,.3);border-radius:999px;
      background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;
    }
    .status{min-height:16px;font-size:12px;color:rgba(255,255,255,.6);text-align:center;}
    .status.ok{color:#4caf50;font-weight:700;}
    .status.error{color:#ff6b6b;font-weight:700;}

    .spinner{display:inline-block;width:14px;height:14px;border-radius:50%;
      border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
      animation:spin .8s linear infinite;vertical-align:-3px;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="wrap">
  <!-- Header -->
  <div class="header">
    <img id="logo" src="https://ultrastudio.vercel.app/logo-ultrastudio.png" alt="UltraStudio"
         onerror="this.style.display='none';document.getElementById('hfb').style.display='block'"/>
    <div id="hfb" class="header-fallback" style="display:none">UltraStudio</div>
  </div>

  <!-- Slot hint -->
  <div class="slot-hint" id="slotHint">Controllo tavole...</div>

  <!-- Label -->
  <div class="campaigns-label">Ultime campagne</div>

  <!-- Lista -->
  <div class="campaigns-list" id="campaignsList">
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <div class="empty-text">Caricamento campagne...</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-apply" id="applyBtn" disabled>Applica alle tavole</button>
    <button class="btn-refresh" id="refreshBtn">↻ Aggiorna lista</button>
    <div class="status" id="status">Seleziona una campagna</div>
  </div>
</div>

<script>
const ENDPOINT = "https://ultrastudio.vercel.app/api/figma/campaigns";

let campaigns = [];
let selectedId = null;

const listEl    = document.getElementById("campaignsList");
const applyBtn  = document.getElementById("applyBtn");
const refreshBtn= document.getElementById("refreshBtn");
const statusEl  = document.getElementById("status");
const slotHint  = document.getElementById("slotHint");

function setStatus(text, type = "") {
  statusEl.className = `status ${type}`;
  statusEl.textContent = text;
}

function setSlotHint(scan) {
  if (!scan) return;
  const img  = scan.imageSlots  || 0;
  const txt  = (scan.headlineSlots||0)+(scan.priceLeftSlots||0)+(scan.priceRightSlots||0)+
               (scan.pricePeriodSlots||0)+(scan.pricePrefixSlots||0)+(scan.ctaSlots||0);
  if (!img && !txt) {
    slotHint.textContent = "Nessun layer UltraStudio trovato.";
  } else {
    slotHint.textContent = `${img} asset · ${txt} testi pronti da aggiornare`;
  }
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("it-IT", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}

function renderList() {
  if (!campaigns.length) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>
      <div class="empty-text">Nessuna campagna trovata.<br>Genera una campagna su UltraStudio.</div></div>`;
    return;
  }

  listEl.innerHTML = campaigns.map((c, idx) => {
    const isLatest   = idx === 0;
    const isSelected = c.id === selectedId;
    const badgeHtml  = isLatest
      ? `<span class="card-badge latest-badge">★ Ultima</span>`
      : `<span class="card-badge">#${idx + 1}</span>`;
    const previewHtml = c.finalImageUrl
      ? `<img src="${c.finalImageUrl}" alt="anteprima" onerror="this.style.display='none'"/>`
      : `<div style="font-size:20px;color:#ccc">📷</div>`;

    return `<div class="campaign-card${isLatest?" latest":""}${isSelected?" selected":""}"
         data-id="${c.id}" onclick="selectCampaign('${c.id}')">
      <div class="card-preview">${previewHtml}</div>
      <div class="card-info">
        ${badgeHtml}
        <div class="card-headline">${c.headline || "—"}</div>
        <div class="card-price">${c.priceLeft || ""}${c.priceRight || ""} ${c.pricePeriod || ""}</div>
        <div class="card-date">${formatDate(c.updatedAt)}</div>
      </div>
    </div>`;
  }).join("");
}

function selectCampaign(id) {
  selectedId = id;
  applyBtn.disabled = false;
  setStatus(`Campagna selezionata`);
  renderList();
}

async function loadCampaigns() {
  listEl.innerHTML = `<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Caricamento...</div></div>`;
  try {
    const r = await fetch(ENDPOINT, { cache: "no-store" });
    if (!r.ok) throw new Error("Errore server");
    const data = await r.json();
    campaigns = Array.isArray(data) ? data : (data.campaigns || []);
    // Auto-seleziona l'ultima
    if (campaigns.length && !selectedId) {
      selectedId = campaigns[0].id;
      applyBtn.disabled = false;
    }
    renderList();
    setStatus(campaigns.length ? "Seleziona una campagna" : "Nessuna campagna");
  } catch (e) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>
      <div class="empty-text">Impossibile caricare le campagne.<br>Verifica che UltraStudio sia online.</div></div>`;
    setStatus("Errore di connessione", "error");
  }
}

async function imageUrlToBytes(url) {
  const r = await fetch(url, { cache: "no-store" });
  if (!r.ok) throw new Error("Asset non disponibile");
  return Array.from(new Uint8Array(await r.arrayBuffer()));
}

applyBtn.addEventListener("click", async () => {
  const campaign = campaigns.find(c => c.id === selectedId);
  if (!campaign) return;

  try {
    applyBtn.disabled = true;
    applyBtn.innerHTML = '<span class="spinner"></span>Applico...';
    setStatus("Aggiornamento in corso...");

    const personImageBytes = campaign.personImageUrl
      ? await imageUrlToBytes(campaign.personImageUrl)
      : [];

    parent.postMessage({ pluginMessage: {
      type: "apply-ultrastudio",
      payload: {
        personImageBytes,
        headline:    campaign.headline    || "",
        priceLeft:   campaign.priceLeft   || "",
        priceRight:  campaign.priceRight  || "",
        pricePeriod: campaign.pricePeriod || "",
        cta:         campaign.cta         || "",
      }
    }}, "*");
  } catch (e) {
    applyBtn.disabled = false;
    applyBtn.textContent = "Applica alle tavole";
    setStatus(e.message || "Errore", "error");
  }
});

refreshBtn.addEventListener("click", loadCampaigns);

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === "scan-result") {
    setSlotHint(msg.result);
    return;
  }

  if (msg.type === "apply-success") {
    applyBtn.disabled = false;
    applyBtn.textContent = "Applica alle tavole";
    const r = msg.result;
    setStatus(`✓ ${r.imageSlots} asset e ${r.textSlots} testi aggiornati`, "ok");
    return;
  }

  if (msg.type === "apply-error") {
    applyBtn.disabled = false;
    applyBtn.textContent = "Applica alle tavole";
    setStatus(msg.message || "Errore", "error");
  }
};

// Init
loadCampaigns();
parent.postMessage({ pluginMessage: { type: "scan-ultrastudio" } }, "*");
</script>
</body>
</html>
